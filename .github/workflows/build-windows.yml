name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm `
            --name="HRTool" `
            --onedir `
            --windowed `
            --add-data="core;core" `
            --add-data="ui;ui" `
            --add-data="db;db" `
            --hidden-import="PyQt6" `
            --hidden-import="PyQt6.QtCore" `
            --hidden-import="PyQt6.QtGui" `
            --hidden-import="PyQt6.QtWidgets" `
            --hidden-import="qfluentwidgets" `
            --hidden-import="pandas" `
            --hidden-import="openpyxl" `
            --hidden-import="pytz" `
            --hidden-import="dateutil" `
            --hidden-import="lxml" `
            --hidden-import="numpy" `
            main.py
        shell: pwsh

      - name: Install Inno Setup
        run: |
          Write-Host "Installing Inno Setup via winget..."
          winget install --id "JRSoftware.InnoSetup" --silent --accept-source-agreements --accept-package-agreements
          if ($LASTEXITCODE -ne 0) {
            Write-Host "winget failed, trying choco..."
            choco install innosetup -y
          }
          Write-Host "Inno Setup installed"
        shell: pwsh

      - name: Create ISS file
        run: |
          $ErrorActionPreference = "Stop"
          $version = python -c "from core.version import get_version; print(get_version())"
          Write-Host "Version: $version"

          $lines = @()
          $lines += "[Setup]"
          $lines += "AppName=HRTool"
          $lines += "AppVersion=" + $version
          $lines += "DefaultDirName={autopf}\HRTool"
          $lines += "DefaultGroupName=HRTool"
          $lines += "OutputDir=dist"
          $lines += "OutputBaseFilename=HRTool-v" + $version + "-windows"
          $lines += "Compression=lzma2/max"
          $lines += "SolidCompression=yes"
          $lines += "WizardStyle=modern"
          $lines += ""
          $lines += "[Files]"
          $lines += 'Source: "dist\HRTool\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs'
          $lines += ""
          $lines += "[Icons]"
          $lines += 'Name: "{group}\HRTool"; Filename: "{app}\HRTool.exe"'
          $lines += 'Name: "{autodesktop}\HRTool"; Filename: "{app}\HRTool.exe"'
          $lines += ""
          $lines += "[Run]"
          $lines += 'Filename: "{app}\HRTool.exe"; Description: "Run application"; Flags: nowait postinstall skipifsilent'

          Set-Content -Path "setup.iss" -Value $lines -Encoding UTF8
          Write-Host "Created setup.iss"
          Get-Content "setup.iss"
        shell: pwsh

      - name: Build installer with ISCC
        run: |
          $ErrorActionPreference = "Stop"
          
          # Find ISCC.exe
          $isccPath = $null
          $searchPaths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          )
          
          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              $isccPath = $path
              break
            }
          }
          
          if (-not $isccPath) {
            # Try to find via where command
            $result = where.exe ISCC 2>$null
            if ($result) {
              $isccPath = $result[0]
            }
          }
          
          if (-not $isccPath -or -not (Test-Path $isccPath)) {
            Write-Error "ISCC.exe not found. Searched: $($searchPaths -join ', ')"
            exit 1
          }
          
          Write-Host "Found ISCC at: $isccPath"
          Write-Host "Building installer..."
          & $isccPath setup.iss
          
          Write-Host "`n=== Build Output ==="
          Get-ChildItem "dist\*windows.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  Created: $($_.Name) ($sizeMB MB)"
          }
        shell: pwsh

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## HR 数据处理工具集 ${{ github.ref_name }}
            
            ### 下载
            
            | 平台 | 安装包 |
            |------|--------|
            | Windows 10/11 | HRTool-${{ github.ref_name }}-windows.exe |
            
            ### 更新内容
            
            请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解详细更新内容。
            
            ### 安装方法
            
            1. 下载安装包
            2. 双击运行安装程序
            3. 按照安装向导完成安装
            
            ### 系统要求
            
            - Windows 10/11 (64位)
            - 无需安装 Python
            
            ### 反馈与支持
            
            - GitHub: https://github.com/${{ github.repository }}
            - Gitee: https://gitee.com/shibo8817/xinfud-tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-gitee:
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Sync to Gitee
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add gitee https://${{ secrets.GITEE_TOKEN }}@gitee.com/shibo8817/xinfud-tools.git 2>/dev/null || true
          git fetch --unshallow 2>/dev/null || true
          git push gitee ${{ github.ref_name }} --force
          
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./dist/
          
      - name: Create Gitee Release
        run: |
          # 获取安装包文件名
          installer=$(ls dist/*-windows.exe | head -1)
          installer_name=$(basename "$installer")
          
          # 创建 Gitee Release
          curl -X POST \
            "https://gitee.com/api/v5/repos/shibo8817/xinfud-tools/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
            -d "{
              \"tag_name\": \"${{ github.ref_name }}\",
              \"name\": \"HR 数据处理工具集 ${{ github.ref_name }}\",
              \"body\": \"自动构建的 Windows 安装包\\n\\n更新内容请查看 CHANGELOG.md\",
              \"prerelease\": false,
              \"target_commitish\": \"main\"
            }"
            
          # 获取 Release ID
          release_id=$(curl -s \
            "https://gitee.com/api/v5/repos/shibo8817/xinfud-tools/releases/tags/${{ github.ref_name }}" \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" | \
            python -c "import sys, json; print(json.load(sys.stdin).get('id', ''))")
          
          if [ -n "$release_id" ]; then
            # 上传安装包
            curl -X POST \
              "https://gitee.com/api/v5/repos/shibo8817/xinfud-tools/releases/$release_id/attach_files" \
              -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
              -F "file=@$installer"
          fi
