name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm ^
            --name="HRTool" ^
            --onedir ^
            --windowed ^
            --add-data="core;core" ^
            --add-data="ui;ui" ^
            --add-data="db;db" ^
            --hidden-import="PyQt6" ^
            --hidden-import="PyQt6.QtCore" ^
            --hidden-import="PyQt6.QtGui" ^
            --hidden-import="PyQt6.QtWidgets" ^
            --hidden-import="qfluentwidgets" ^
            --hidden-import="pandas" ^
            --hidden-import="openpyxl" ^
            main.py

      - name: Download and install Inno Setup
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Downloading Inno Setup..."
          $innoUrl = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $innoPath = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoPath -UseBasicParsing
          Write-Host "Installing Inno Setup..."
          Start-Process -FilePath $innoPath -ArgumentList "/VERYSILENT","/NORESTART" -Wait -PassThru
          Write-Host "Inno Setup installed successfully"
        shell: pwsh

      - name: Create installer with Inno Setup
        run: |
          $ErrorActionPreference = "Stop"
          
          # Get version
          $version = python -c "from core.version import get_version; print(get_version())"
          Write-Host "Version: $version"
          
          # Create Inno Setup script
          $issPath = "setup.iss"
          $iss = @'
[Setup]
AppName=HR数据处理工具集
AppVersion={#Version}
DefaultDirName={autopf}\HR数据处理工具集
DefaultGroupName=HR数据处理工具集
OutputDir=dist
OutputBaseFilename=HRTool-v{#Version}-windows
Compression=lzma2/max
SolidCompression=yes
WizardStyle=modern

[Files]
Source: "dist\HRTool\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

[Icons]
Name: "{group}\HR数据处理工具集"; Filename: "{app}\HRTool.exe"
Name: "{autodesktop}\HR数据处理工具集"; Filename: "{app}\HRTool.exe"

[Run]
Filename: "{app}\HRTool.exe"; Description: "运行程序"; Flags: nowait postinstall skipifsilent
'@
          
          # Replace version placeholder
          $iss = $iss.Replace('{#Version}', $version)
          Set-Content -Path $issPath -Value $iss -Encoding UTF8
          Write-Host "Created $issPath"
          Get-Content $issPath
          
          # Build installer
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $isccPath)) {
            Write-Error "Inno Setup not found at $isccPath"
            exit 1
          }
          
          Write-Host "Building installer..."
          & $isccPath $issPath
          
          # Verify output
          Write-Host "`n=== Build Output ==="
          Get-ChildItem "dist\*windows.exe" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  Created: $($_.Name) ($sizeMB MB)"
          }
        shell: pwsh

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
