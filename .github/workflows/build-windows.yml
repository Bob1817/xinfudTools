name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发（如 v1.0.0）
  workflow_dispatch:  # 支持手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 使用 PyInstaller 打包
        run: |
          pyinstaller --clean --noconfirm ^
            --name="HR数据处理工具集" ^
            --onedir ^
            --windowed ^
            --add-data="core;core" ^
            --add-data="ui;ui" ^
            --add-data="db;db" ^
            --hidden-import="PyQt6" ^
            --hidden-import="PyQt6.QtCore" ^
            --hidden-import="PyQt6.QtGui" ^
            --hidden-import="PyQt6.QtWidgets" ^
            --hidden-import="qfluentwidgets" ^
            --hidden-import="pandas" ^
            --hidden-import="openpyxl" ^
            main.py

      - name: 下载 Inno Setup
        run: |
          $innoUrl = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $innoPath = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoPath
          Start-Process -FilePath $innoPath -ArgumentList "/VERYSILENT", "/NORESTART" -Wait

      - name: 创建安装程序
        run: |
          $version = python -c "from core.version import get_version; print(get_version())"
          $appName = "HR数据处理工具集"
          $exeName = "${appName}-v${version}-windows.exe"
          
          # 创建 Inno Setup 脚本
          $issContent = @"
[Setup]
AppName=$appName
AppVersion=$version
DefaultDirName={autopf}\$appName
DefaultGroupName=$appName
OutputDir=dist
OutputBaseFilename=$exeName
Compression=lzma2/max
SolidCompression=yes
WizardStyle=modern

[Files]
Source: "dist\$appName\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

[Icons]
Name: "{group}\$appName"; Filename: "{app}\$appName.exe"
Name: "{autodesktop}\$appName"; Filename: "{app}\$appName.exe"

[Run]
Filename: "{app}\$appName.exe"; Description: "运行程序"; Flags: nowait postinstall skipifsilent
"@
          
          $issContent | Out-File -FilePath "setup.iss" -Encoding UTF8
          
          # 编译安装程序
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          
          # 显示结果
          Write-Host "`n生成的安装包："
          Get-ChildItem "dist\*.exe" | ForEach-Object {
            Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)"
          }

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows.exe
          retention-days: 30
