name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm ^
            --name="HRTool" ^
            --onedir ^
            --windowed ^
            --add-data="core;core" ^
            --add-data="ui;ui" ^
            --add-data="db;db" ^
            --hidden-import="PyQt6" ^
            --hidden-import="PyQt6.QtCore" ^
            --hidden-import="PyQt6.QtGui" ^
            --hidden-import="PyQt6.QtWidgets" ^
            --hidden-import="qfluentwidgets" ^
            --hidden-import="pandas" ^
            --hidden-import="openpyxl" ^
            main.py

      - name: Download Inno Setup
        run: |
          $ErrorActionPreference = "Stop"
          $innoUrl = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $innoPath = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoPath -UseBasicParsing
          Start-Process -FilePath $innoPath -ArgumentList "/VERYSILENT","/NORESTART" -Wait
        shell: pwsh

      - name: Create installer
        run: |
          $ErrorActionPreference = "Stop"
          $version = python -c "from core.version import get_version; print(get_version())"
          $exeName = "HRTool-v" + $version + "-windows.exe"
          Write-Host "Building: $exeName"
          
          $iss = "[Setup]`n"
          $iss += "AppName=HR数据处理工具集`n"
          $iss += "AppVersion=$version`n"
          $iss += "DefaultDirName={autopf}\HR数据处理工具集`n"
          $iss += "DefaultGroupName=HR数据处理工具集`n"
          $iss += "OutputDir=dist`n"
          $iss += "OutputBaseFilename=$exeName`n"
          $iss += "Compression=lzma2/max`n"
          $iss += "SolidCompression=yes`n"
          $iss += "WizardStyle=modern`n`n"
          $iss += "[Files]`n"
          $iss += 'Source: "dist\HRTool\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs' + "`n`n"
          $iss += "[Icons]`n"
          $iss += 'Name: "{group}\HR数据处理工具集"; Filename: "{app}\HRTool.exe"' + "`n"
          $iss += 'Name: "{autodesktop}\HR数据处理工具集"; Filename: "{app}\HRTool.exe"' + "`n`n"
          $iss += "[Run]`n"
          $iss += 'Filename: "{app}\HRTool.exe"; Description: "运行程序"; Flags: nowait postinstall skipifsilent' + "`n"
          
          Set-Content -Path "setup.iss" -Value $iss -Encoding UTF8
          Write-Host "Created setup.iss"
          
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          
          Write-Host "`n=== Generated installer ==="
          Get-ChildItem "dist\*.exe" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) ($sizeMB MB)"
          }
        shell: pwsh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows.exe
          retention-days: 90
