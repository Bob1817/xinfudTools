name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm ^
            --name="HRTool" ^
            --onedir ^
            --windowed ^
            --add-data="core;core" ^
            --add-data="ui;ui" ^
            --add-data="db;db" ^
            --hidden-import="PyQt6" ^
            --hidden-import="PyQt6.QtCore" ^
            --hidden-import="PyQt6.QtGui" ^
            --hidden-import="PyQt6.QtWidgets" ^
            --hidden-import="qfluentwidgets" ^
            --hidden-import="pandas" ^
            --hidden-import="openpyxl" ^
            main.py

      - name: Download and install Inno Setup
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Downloading Inno Setup..."
          $innoUrl = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $innoPath = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoPath -UseBasicParsing
          Write-Host "Installing Inno Setup..."
          Start-Process -FilePath $innoPath -ArgumentList "/VERYSILENT","/NORESTART" -Wait -PassThru
          Write-Host "Inno Setup installed successfully"
        shell: pwsh

      - name: Create ISS file
        run: |
          $ErrorActionPreference = "Stop"
          $version = python -c "from core.version import get_version; print(get_version())"
          Write-Host "Version: $version"

          $lines = @()
          $lines += "[Setup]"
          $lines += "AppName=HRTool"
          $lines += "AppVersion=" + $version
          $lines += "DefaultDirName={autopf}\HRTool"
          $lines += "DefaultGroupName=HRTool"
          $lines += "OutputDir=dist"
          $lines += "OutputBaseFilename=HRTool-v" + $version + "-windows"
          $lines += "Compression=lzma2/max"
          $lines += "SolidCompression=yes"
          $lines += "WizardStyle=modern"
          $lines += ""
          $lines += "[Files]"
          $lines += 'Source: "dist\HRTool\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs'
          $lines += ""
          $lines += "[Icons]"
          $lines += 'Name: "{group}\HRTool"; Filename: "{app}\HRTool.exe"'
          $lines += 'Name: "{autodesktop}\HRTool"; Filename: "{app}\HRTool.exe"'
          $lines += ""
          $lines += "[Run]"
          $lines += 'Filename: "{app}\HRTool.exe"; Description: "Run application"; Flags: nowait postinstall skipifsilent'

          Set-Content -Path "setup.iss" -Value $lines -Encoding UTF8
          Write-Host "Created setup.iss"
          Get-Content "setup.iss"
        shell: pwsh

      - name: Build installer with ISCC
        run: |
          $ErrorActionPreference = "Stop"
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          
          if (-not (Test-Path $isccPath)) {
            Write-Error "Inno Setup not found at $isccPath"
            exit 1
          }
          
          Write-Host "Building installer..."
          & $isccPath setup.iss
          
          Write-Host "`n=== Build Output ==="
          Get-ChildItem "dist\*windows.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  Created: $($_.Name) ($sizeMB MB)"
          }
        shell: pwsh

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*-windows.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*-windows.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
