name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Windows executable
      run: |
        pyinstaller HR数据处理工具集.spec --clean
        
    - name: Package installer
      run: |
        cd dist
        ren "HR数据处理工具集.exe" "HR数据处理工具集-v${{ github.ref_name }}-windows.exe"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: dist/HR数据处理工具集-v*-windows.exe
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/HR数据处理工具集-v*-windows.exe
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## HR 数据处理工具集 ${{ github.ref_name }}
          
          ### 下载
          
          | 平台 | 安装包 |
          |------|--------|
          | Windows 10/11 | HR数据处理工具集-${{ github.ref_name }}-windows.exe |
          
          ### 更新内容
          
          请查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解详细更新内容。
          
          ### 安装方法
          
          1. 下载安装包
          2. 双击运行安装程序
          3. 按照安装向导完成安装
          
          ### 系统要求
          
          - Windows 10/11 (64位)
          - 无需安装 Python
          
          ### 反馈与支持
          
          - GitHub: https://github.com/${{ github.repository }}
          - Gitee: https://gitee.com/shibo8817/xinfud-tools
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-gitee:
    runs-on: ubuntu-latest
    needs: build-windows
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Sync to Gitee
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git remote add gitee https://${{ secrets.GITEE_TOKEN }}@gitee.com/shibo8817/xinfud-tools.git || true
        git push gitee ${{ github.ref_name }} --force
        
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-installer
        path: ./dist/
        
    - name: Create Gitee Release
      run: |
        # 使用 Gitee API 创建 Release
        curl -X POST \
          "https://gitee.com/api/v5/repos/shibo8817/xinfud-tools/releases" \
          -H "Content-Type: application/json" \
          -d '{
            "tag_name": "${{ github.ref_name }}",
            "name": "HR 数据处理工具集 ${{ github.ref_name }}",
            "body": "自动构建的 Windows 安装包",
            "prerelease": false
          }'
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
